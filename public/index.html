<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YouTube Channel Video Extractor</title>

<style>

body{
font-family: Arial;
padding:40px;
background:#f5f5f5;
}

input{
padding:10px;
width:400px;
}

button{
padding:10px 15px;
margin-left:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#333;
color:white;
}

#status{
margin-top:10px;
font-weight:bold;
}

.donate{
position:fixed;
top:15px;
left:15px;
background:#FFDD00;
padding:8px 14px;
border-radius:8px;
text-decoration:none;
color:black;
font-weight:bold;
}

.guide{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

</style>

</head>

<body>

<a href="https://buymeacoffee.com/avantkarsh1"
target="_blank"
class="donate">
☕ Support
</a>

<h2>YouTube Channel Video Extractor</h2>

<div class="guide">

<h3>How to Use</h3>

<ol>
<li>Copy a YouTube channel URL</li>
<li>Paste it below</li>
<li>Click Fetch Videos</li>
<li>Wait until extraction completes</li>
<li>Download CSV if needed</li>
</ol>

</div>

<input
type="text"
id="channelUrl"
placeholder="Enter YouTube Channel URL"
/>

<button onclick="fetchChannel()">Fetch Videos</button>
<button onclick="loadVideos()">Refresh Table</button>
<button onclick="downloadCSV()">Download CSV</button>

<p id="status"></p>

<table id="videoTable">

<thead>
<tr>
<th>Title</th>
<th>Video Link</th>
<th>Upload Date</th>
<th>Views</th>
<th>Likes</th>
<th>Comments</th>
<th>Duration</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

async function fetchChannel(){

const url=document.getElementById("channelUrl").value;

if(!url){
alert("Enter channel URL");
return;
}

document.getElementById("status").innerText="Fetching videos...";

const res=await fetch("/fetch-channel",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({channelUrl:url})
});

if(res.status===429){

document.getElementById("status").innerText="Another request is running. Please wait.";

return;
}

const data=await res.json();

document.getElementById("status").innerText="Fetched "+data.totalVideos+" videos.";

loadVideos();
}

async function loadVideos(){

const res=await fetch("/videos");

const data=await res.json();

const tbody=document.querySelector("#videoTable tbody");

tbody.innerHTML="";

data.forEach(video=>{

const row=`
<tr>
<td>${video.title}</td>
<td><a href="${video.link}" target="_blank">Watch</a></td>
<td>${video.uploadDate}</td>
<td>${video.views}</td>
<td>${video.likes}</td>
<td>${video.comments}</td>
<td>${video.duration}</td>
</tr>
`;

tbody.innerHTML+=row;

});

}

function downloadCSV(){

window.location.href="/download-csv";

}

</script>

</body>
</html>
